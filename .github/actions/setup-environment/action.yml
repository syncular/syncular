name: 'Setup Bun'
description: 'Installs Bun and all dependencies.'
runs:
  using: "composite"
  steps:
    # Node 24 is required for publishing to npm
    - uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Resolve Bun download URL
      id: setup-bun-url
      shell: bash
      run: |
        set -euo pipefail

        bun_version="1.3.9"

        case "$(uname -s)/$(uname -m)" in
          Linux/x86_64)
            bun_target="linux-x64"
            ;;
          Linux/aarch64|Linux/arm64)
            bun_target="linux-aarch64"
            ;;
          Darwin/x86_64)
            bun_target="darwin-x64"
            ;;
          Darwin/arm64)
            bun_target="darwin-aarch64"
            ;;
          *)
            echo "Unsupported runner platform for Bun: $(uname -s)/$(uname -m)" >&2
            exit 1
            ;;
        esac

        echo "url=https://github.com/oven-sh/bun/releases/download/bun-v${bun_version}/bun-${bun_target}.zip" >> "$GITHUB_OUTPUT"

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.9
        bun-download-url: ${{ steps.setup-bun-url.outputs.url }}

    - name: Setup Rust for package builds
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown

    - name: Harden Cargo registry downloads
      shell: bash
      run: |
        echo "CARGO_HTTP_MULTIPLEXING=false" >> "$GITHUB_ENV"
        echo "CARGO_NET_RETRY=10" >> "$GITHUB_ENV"

    - name: Setup wasm-pack
      uses: jetli/wasm-pack-action@v0.4.0

    - name: Setup wasm-opt
      shell: bash
      run: |
        set -euo pipefail

        binaryen_version="130"
        case "$(uname -s)/$(uname -m)" in
          Linux/x86_64)
            binaryen_target="x86_64-linux"
            ;;
          Linux/aarch64|Linux/arm64)
            binaryen_target="aarch64-linux"
            ;;
          Darwin/x86_64)
            binaryen_target="x86_64-macos"
            ;;
          Darwin/arm64)
            binaryen_target="arm64-macos"
            ;;
          MINGW*/*|MSYS*/*|CYGWIN*/*)
            case "$(uname -m)" in
              x86_64)
                binaryen_target="x86_64-windows"
                ;;
              aarch64|arm64)
                binaryen_target="arm64-windows"
                ;;
              *)
                echo "Unsupported Windows architecture for Binaryen: $(uname -m)" >&2
                exit 1
                ;;
            esac
            ;;
          *)
            echo "Unsupported runner platform for Binaryen: $(uname -s)/$(uname -m)" >&2
            exit 1
            ;;
        esac

        temp_root="${RUNNER_TEMP:-${TMPDIR:-/tmp}}"
        if command -v cygpath >/dev/null 2>&1; then
          temp_root="$(cygpath -u "$temp_root")"
        fi

        install_dir="${temp_root}/binaryen-version_${binaryen_version}-${binaryen_target}"
        archive="${temp_root}/binaryen-version_${binaryen_version}-${binaryen_target}.tar.gz"
        url="https://github.com/WebAssembly/binaryen/releases/download/version_${binaryen_version}/binaryen-version_${binaryen_version}-${binaryen_target}.tar.gz"

        rm -rf "$install_dir" "$archive"
        mkdir -p "$install_dir"
        curl -fsSL "$url" -o "$archive"
        tar -xzf "$archive" -C "$install_dir" --strip-components=1

        echo "${install_dir}/bin" >> "$GITHUB_PATH"
        "${install_dir}/bin/wasm-opt" --version

    - name: Install Dependencies
      shell: bash
      run: bun install --frozen-lockfile

    # Turbo build setup
    - name: Cache turbo build setup
      uses: actions/cache@v4
      with:
        path: .turbo
        key: ${{ runner.os }}-turbo-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-turbo-

    - name: Build Packages
      shell: bash
      run: bun run build
