name: 'Setup Bun'
description: 'Installs Bun and all dependencies.'
runs:
  using: "composite"
  steps:
    # Node 24 is required for publishing to npm
    - uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Resolve Bun download URL
      id: setup-bun-url
      shell: bash
      run: |
        set -euo pipefail

        bun_version="1.3.9"

        case "$(uname -s)/$(uname -m)" in
          Linux/x86_64)
            bun_target="linux-x64"
            ;;
          Linux/aarch64|Linux/arm64)
            bun_target="linux-aarch64"
            ;;
          Darwin/x86_64)
            bun_target="darwin-x64"
            ;;
          Darwin/arm64)
            bun_target="darwin-aarch64"
            ;;
          *)
            echo "Unsupported runner platform for Bun: $(uname -s)/$(uname -m)" >&2
            exit 1
            ;;
        esac

        echo "url=https://github.com/oven-sh/bun/releases/download/bun-v${bun_version}/bun-${bun_target}.zip" >> "$GITHUB_OUTPUT"

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.9
        bun-download-url: ${{ steps.setup-bun-url.outputs.url }}

    - name: Setup Rust for package builds
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown

    - name: Setup wasm-pack
      uses: jetli/wasm-pack-action@v0.4.0

    - name: Setup wasm-opt
      shell: bash
      run: |
        set -euo pipefail

        if command -v wasm-opt >/dev/null 2>&1; then
          exit 0
        fi

        case "${RUNNER_OS:-$(uname -s)}" in
          Linux)
            sudo apt-get update
            sudo apt-get install -y binaryen
            ;;
          macOS)
            brew install binaryen
            ;;
          Windows)
            choco install binaryen -y
            ;;
          *)
            echo "Unsupported runner OS for wasm-opt installation: ${RUNNER_OS:-$(uname -s)}" >&2
            exit 1
            ;;
        esac

    - name: Install Dependencies
      shell: bash
      run: bun install --frozen-lockfile

    # Turbo build setup
    - name: Cache turbo build setup
      uses: actions/cache@v4
      with:
        path: .turbo
        key: ${{ runner.os }}-turbo-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-turbo-

    - name: Build Packages
      shell: bash
      run: bun run build
