name: Demo

# Builds the static demo (apps/demo — the whole sync server runs in a Web
# Worker on the page, so the published artifact is plain static assets) and
# deploys it to the Workers static-assets worker `syncular-demo`, served at
# demo.syncular.dev. The worker name matches the pre-existing deployment, so
# a deploy replaces it in place — DNS and the domain attachment are never
# touched. Kept in its OWN workflow (the docs.yml reasoning): it deploys and
# needs the CLOUDFLARE_API_TOKEN secret, which the gate workflow should not
# have. The secret is the same one docs.yml uses — no extra setup.

on:
  push:
    branches: [main]
    # Path gate: the demo bundles the engine packages, so package changes
    # redeploy it too — a stale demo undersells every engine improvement.
    paths:
      - 'apps/demo/**'
      - 'packages/**'
      - 'bun.lock'
      - '.github/workflows/demo.yml'

# One in-flight deploy at a time; a newer push supersedes an older run rather
# than racing it. Don't cancel mid-deploy — let it finish, then the next runs.
concurrency:
  group: demo-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build the static demo (dist/)
        working-directory: apps/demo
        run: bun run build:static

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 336bfd20ccb2f56e24ac0afeca6b4837
          workingDirectory: apps/demo
          command: deploy
