name: Weekly Soak

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

concurrency:
  group: weekly-soak-${{ github.ref }}
  cancel-in-progress: true

jobs:
  soak:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-environment
      - uses: grafana/setup-k6-action@v1

      - name: Run weekly reconnect + mixed soak
        env:
          LOAD_NIGHTLY_SMOKE: false
          LOAD_NIGHTLY_SCENARIOS: reconnect-storm,mixed-workload
          LOAD_NIGHTLY_OUTPUT_JSON: weekly-soak-summary.json
          LOAD_NIGHTLY_RESULTS_DIR: .tmp/weekly-soak
          LOAD_SERVER_PORT: 3001
          LOAD_DB_DIALECT: sqlite
          SQLITE_PATH: ':memory:'
          SEED_ROWS: 500000
          SEED_USERS: 1400
          SEED_RANDOM_SEED: 42
          K6_SOAK: true
          RECONNECT_STORM_SOAK_VUS: 120
          RECONNECT_STORM_SOAK_DURATION: 30m
          MIXED_SOAK_DURATION: 25m
          MIXED_SOAK_READERS: 160
          MIXED_SOAK_WRITERS: 40
          MIXED_SOAK_WEBSOCKETS: 220
        run: bun run test:load:nightly 2>&1 | tee weekly-soak-results.txt

      - name: Upload soak artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-soak-${{ github.run_id }}
          path: |
            weekly-soak-results.txt
            weekly-soak-summary.json
            .tmp/weekly-soak

      - name: Publish soak summary
        if: always()
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const summaryPath = process.env.GITHUB_STEP_SUMMARY;
          if (!fs.existsSync('weekly-soak-summary.json')) {
            process.exit(0);
          }

          const report = JSON.parse(fs.readFileSync('weekly-soak-summary.json', 'utf8'));
          const lines = [];

          lines.push('## Weekly Soak Summary');
          lines.push('');
          lines.push(`- Scenarios: ${report.scenarioCount}`);
          lines.push(`- Failed scenarios: ${report.failedScenarioCount}`);
          lines.push('');
          lines.push('| Scenario | Status | Duration | HTTP p95 | HTTP p99 | HTTP error rate |');
          lines.push('|----------|--------|----------|----------|----------|-----------------|');

          for (const scenario of report.scenarios ?? []) {
            const status = scenario.passed ? 'pass' : 'fail';
            const duration = `${(Number(scenario.durationMs) / 1000).toFixed(1)}s`;
            const httpP95 =
              scenario.metrics?.httpP95 == null
                ? 'N/A'
                : `${Number(scenario.metrics.httpP95).toFixed(1)}ms`;
            const httpP99 =
              scenario.metrics?.httpP99 == null
                ? 'N/A'
                : `${Number(scenario.metrics.httpP99).toFixed(1)}ms`;
            const errorRate =
              scenario.metrics?.httpErrorRate == null
                ? 'N/A'
                : `${(Number(scenario.metrics.httpErrorRate) * 100).toFixed(2)}%`;
            lines.push(`| ${scenario.id} | ${status} | ${duration} | ${httpP95} | ${httpP99} | ${errorRate} |`);

            if (scenario.failedThresholds?.length > 0) {
              lines.push(`- ${scenario.id} failed thresholds: ${scenario.failedThresholds.join(', ')}`);
            }
            if (scenario.invariantFailures?.length > 0) {
              lines.push(`- ${scenario.id} invariant failures: ${scenario.invariantFailures.join(', ')}`);
            }
          }

          fs.appendFileSync(summaryPath, `${lines.join('\n')}\n`);
          NODE
