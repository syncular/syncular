# Trusted-publishing release: npm (OIDC provenance) + crates.io (OIDC).
#
# Prerequisites (one-time, web UI, AFTER the first local publish — both
# registries only attach trusted publishers to EXISTING packages/crates):
#   - npmjs.com: each @syncular/* package + create-syncular-app →
#     Settings → Trusted publisher → GitHub Actions →
#     owner `syncular`, repo `syncular`, workflow `release.yml`.
#   - crates.io: syncular-ssp2, syncular-client, syncular-command,
#     syncular-ffi, syncular, tauri-plugin-syncular → Settings →
#     Trusted Publishing → GitHub repo `syncular/syncular`, workflow
#     `release.yml`.
#
# No registry tokens are stored anywhere; both jobs authenticate via the
# GitHub OIDC token (`id-token: write`).
#
# Trigger: push a version tag (`v<version>`). Versions in package.json /
# Cargo.toml must already match the tag — the jobs verify and fail loudly
# rather than publish a mismatch.

name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # npm CLI >= 11.5 performs OIDC trusted publishing natively.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install -g npm@latest
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run build:packages
      - name: verify tag matches package versions
        if: github.ref_type == 'tag'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          V=$(bun -e "console.log((await Bun.file('packages/core/package.json').json()).version)")
          [ "$TAG" = "$V" ] || { echo "tag $TAG != package version $V"; exit 1; }
      - name: publish (dependency order)
        run: |
          set -euo pipefail
          # bun pm pack materializes workspace:* deps in the tarball
          # manifest; npm publish provides OIDC + provenance.
          # Already-published versions are SKIPPED (not failed) so a re-run
          # after a partial failure — e.g. the crates job died mid-release —
          # publishes only what is missing instead of failing on the first
          # duplicate.
          for dir in core crypto crdt-yjs server server-hono \
                     server-workers web-client react typegen tauri \
                     testing create-app; do
            name=$(bun -e "console.log((await Bun.file('packages/$dir/package.json').json()).name)")
            ver=$(bun -e "console.log((await Bun.file('packages/$dir/package.json').json()).version)")
            if npm view "$name@$ver" version >/dev/null 2>&1; then
              echo "── skipping $name@$ver (already published)"
              continue
            fi
            echo "── publishing $name@$ver"
            # Guard (0.4.0 lesson): bun pm pack materializes workspace:*
            # from the LOCKFILE's workspace version stamps — stale stamps
            # ship tarballs pinning @syncular/* siblings at the PREVIOUS
            # release (split-brain installs). scripts/check-lockstep.mjs
            # (inside `bun run check` above) catches the root cause; this
            # asserts it on the actual artifact before it can publish.
            (cd "packages/$dir" \
              && bun pm pack --quiet \
              && tar -xOf ./*.tgz package/package.json > /tmp/manifest.json \
              && node -e '
                   const m = require("/tmp/manifest.json");
                   const bad = Object.entries({ ...m.dependencies, ...m.peerDependencies })
                     .filter(([n, v]) => n.startsWith("@syncular/") && v !== process.argv[1]);
                   if (bad.length) {
                     console.error("stale workspace pins in tarball (fix bun.lock stamps, docs/RELEASE.md):", bad);
                     process.exit(1);
                   }
                 ' "$ver" \
              && npm publish ./*.tgz --provenance --access public \
              && rm -f ./*.tgz)
          done

  crates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: verify tag matches crate versions
        if: github.ref_type == 'tag'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          for toml in rust/crates/ssp2/Cargo.toml bindings/tauri/plugin/Cargo.toml; do
            V=$(grep -m1 '^version' "$toml" | sed 's/.*"\(.*\)"/\1/')
            [ "$TAG" = "$V" ] || { echo "tag $TAG != $toml version $V"; exit 1; }
          done
      # The Tauri plugin's verify build compiles tauri on Linux, which needs
      # the GTK/WebKit system libraries — without them gdk-sys/gio-sys/
      # gobject-sys build scripts fail and the publish dies at the last step
      # (observed on the v0.3.1 run).
      - name: install Tauri Linux system deps (plugin verify build)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf
      - name: native release gates
        run: |
          cargo test --manifest-path rust/Cargo.toml --workspace
          cargo test --manifest-path rust/Cargo.toml \
            -p syncular-ffi --features native-transport round_tests
          cargo test --manifest-path bindings/tauri/Cargo.toml \
            -p tauri-plugin-syncular --features native-transport
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: publish (dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail
          # All crates release in lockstep — one version, read once (the
          # tag-verify step above already enforced it matches the tag).
          VERSION=$(grep -m1 '^version' rust/crates/ssp2/Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          # Skip crates whose version already sits on the index (sparse-index
          # lookup, no auth), so a re-run after a partial failure publishes
          # only what is missing. cargo waits for each publish to reach the
          # index before the dependent crate publishes.
          published() { # published <crate> → 0 if $VERSION is on the index
            local c=$1 path
            case ${#c} in
              1) path="1/$c" ;;
              2) path="2/$c" ;;
              3) path="3/${c:0:1}/$c" ;;
              *) path="${c:0:2}/${c:2:2}/$c" ;;
            esac
            curl -fsSL "https://index.crates.io/$path" 2>/dev/null \
              | grep -q "\"vers\":\"$VERSION\""
          }
          publish() {
            if published "$1"; then
              echo "── skipping $1@$VERSION (already on the index)"
              return 0
            fi
            echo "── publishing $1@$VERSION"
            cargo publish -p "$1"
          }
          cd rust
          publish syncular-ssp2
          publish syncular-client
          publish syncular-command
          publish syncular-ffi
          publish syncular
          # The Tauri plugin lives in its OWN workspace (bindings/tauri/,
          # kept out of the main cargo gate); its path deps carry version
          # constraints that resolve against the crates just published.
          cd ../bindings/tauri
          publish tauri-plugin-syncular
