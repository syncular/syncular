name: Release

on:
  workflow_run:
    workflows: ["Checks"]
    types: [completed]
    branches: [release]
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel to publish.
        required: true
        default: staging
        type: choice
        options:
          - staging
          - stable
      version:
        description: Exact stable version. Defaults to the tag without v, or root package.json version.
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'release')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - uses: ./.github/actions/setup-environment

      - name: Setup Rust for Rust bindings
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup wasm-pack for Rust bindings
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Resolve release version
        id: release_meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          INPUT_CHANNEL: ${{ inputs.channel || '' }}
          INPUT_VERSION: ${{ inputs.version || '' }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail

          root_version="$(bun -e 'console.log(require("./package.json").version)')"
          channel="$INPUT_CHANNEL"
          version="$INPUT_VERSION"

          if [ "$EVENT_NAME" = "workflow_run" ]; then
            channel="staging"
          elif [ "$EVENT_NAME" = "push" ] && [ "$REF_TYPE" = "tag" ]; then
            channel="stable"
            if [ -z "$version" ]; then
              version="${REF_NAME#v}"
            fi
          elif [ -z "$channel" ]; then
            channel="staging"
          fi

          if [ "$channel" = "stable" ]; then
            if [ -z "$version" ]; then
              version="$root_version"
            fi
            npm_tag="latest"
          elif [ "$channel" = "staging" ]; then
            version="${root_version}-staging.${RUN_NUMBER}"
            npm_tag="staging"
          else
            echo "Unsupported release channel: $channel" >&2
            exit 1
          fi

          case "$version" in
            v*) version="${version#v}" ;;
          esac

          if ! echo "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "Invalid SemVer version: $version" >&2
            exit 1
          fi

          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "npm_tag=$npm_tag" >> "$GITHUB_OUTPUT"
          echo "Publishing $channel release version $version with npm tag $npm_tag"

      # Stable versions are committed by Changesets (`bun run version`), so the
      # checkout already carries the right npm + Cargo versions; we only verify.
      # Staging releases stamp an ephemeral prerelease version that is never
      # committed.
      - name: Verify committed release versions (stable)
        if: steps.release_meta.outputs.channel == 'stable'
        run: |
          set -euo pipefail
          committed="$(bun -e 'console.log(require("./packages/core/package.json").version)')"
          expected='${{ steps.release_meta.outputs.version }}'
          if [ "$committed" != "$expected" ]; then
            echo "Committed package version ($committed) does not match release version ($expected)." >&2
            echo "Run 'bun run version' (changeset version + sync) and commit before tagging a stable release." >&2
            exit 1
          fi

      - name: Stamp ephemeral npm and Cargo versions (staging)
        if: steps.release_meta.outputs.channel == 'staging'
        run: |
          bun scripts/stamp-versions.ts --version '${{ steps.release_meta.outputs.version }}'
          bun scripts/stamp-cargo-versions.ts --version '${{ steps.release_meta.outputs.version }}'

      - name: Publish npm packages
        env:
          SYNCULAR_NPM_TAG: ${{ steps.release_meta.outputs.npm_tag }}
        run: |
          npm config set registry https://registry.npmjs.org/
          bun run release

      - name: Publish Cargo crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: bun run release:cargo

      - name: Post-publish install smokes
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if bun run release:post-publish-smokes -- --version '${{ steps.release_meta.outputs.version }}'; then
              exit 0
            fi
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            echo "Post-publish install smoke failed; retrying after registry propagation..."
            sleep 60
          done
