name: Dependency security

on:
  push:
    branches: [main]
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'deny.toml'
      - '.github/dependabot.yml'
      - '.github/workflows/security.yml'
  pull_request:
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'deny.toml'
      - '.github/dependabot.yml'
      - '.github/workflows/security.yml'
  schedule:
    # Catch advisories disclosed after a dependency was merged.
    - cron: '17 4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  issues: write

jobs:
  cargo-audit:
    name: RustSec (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: core
            directory: rust
          - workspace: tauri
            directory: bindings/tauri
    steps:
      - uses: actions/checkout@v5
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: ${{ matrix.directory }}

  cargo-policy:
    name: cargo-deny (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: core
            manifest: rust/Cargo.toml
          - workspace: tauri
            manifest: bindings/tauri/Cargo.toml
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: stable
          manifest-path: ${{ matrix.manifest }}
          arguments: --locked
