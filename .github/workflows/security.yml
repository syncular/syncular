name: Dependency security

on:
  push:
    branches: [main]
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'deny.toml'
      - '.github/dependabot.yml'
      - '.github/workflows/security.yml'
  pull_request:
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'deny.toml'
      - '.github/dependabot.yml'
      - '.github/workflows/security.yml'
  schedule:
    # Catch advisories disclosed after a dependency was merged.
    - cron: '17 4 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cargo-policy:
    name: cargo-deny (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: core
            manifest: rust/Cargo.toml
          - workspace: tauri
            manifest: bindings/tauri/Cargo.toml
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          rust-version: stable
          manifest-path: ${{ matrix.manifest }}
          arguments: --locked

  # JS advisories disclosed after the last push would otherwise sit unnoticed
  # until the next push (ci.yml runs `bun run audit` on push/PR). This job
  # gives the daily cron the same JS supply-chain coverage.
  js-audit:
    name: JS advisories (bun audit)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Audit dependencies
        run: bun run audit
