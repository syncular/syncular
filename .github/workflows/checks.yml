name: Checks

on:
  push:
    branches: [main, release]
  pull_request:
    branches: [main, release]
  workflow_dispatch:

concurrency:
  group: checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      runtime: ${{ steps.filter.outputs.runtime }}
      runtime_relay: ${{ steps.filter.outputs.runtime_relay }}
      runtime_electron: ${{ steps.filter.outputs.runtime_electron }}
      expo: ${{ steps.filter.outputs.expo }}
      demo: ${{ steps.filter.outputs.demo }}
      load: ${{ steps.filter.outputs.load }}
      rust: ${{ steps.filter.outputs.rust }}
      starter: ${{ steps.filter.outputs.starter }}
      sync_matrix: ${{ steps.filter.outputs.sync_matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            runtime:
              - 'packages/client/**'
              - 'packages/core/**'
              - 'packages/testkit/**'
              - 'packages/server/**'
            runtime_relay:
              - 'packages/core/**'
              - 'packages/testkit/**'
              - 'packages/server/**'
            runtime_electron:
              - 'packages/client/**'
              - 'packages/core/**'
              - 'packages/testkit/**'
              - 'packages/server/**'
            expo:
              - 'packages/client/**'
              - 'packages/core/src/kysely-serialize.ts'
            demo:
              - 'packages/client/**'
              - 'packages/core/**'
              - 'packages/testkit/**'
              - 'packages/server/**'
              - 'packages/observability-sentry/**'
            load:
              - 'tests/load/**'
              - 'packages/core/**'
              - 'packages/testkit/**'
              - 'packages/server/**'
            rust:
              - 'rust/**'
              - '.github/workflows/checks.yml'
              - '.github/actions/setup-environment/action.yml'
              - 'package.json'
              - 'bun.lock'
              - 'packages/client/**'
              - 'packages/core/**'
              - 'packages/server/**'
              - 'packages/testkit/**'
            starter:
              - '.github/workflows/checks.yml'
              - '.github/actions/setup-environment/action.yml'
              - 'package.json'
              - 'bun.lock'
              - 'packages/create-syncular-app/**'
              - 'packages/client/**'
              - 'packages/core/**'
              - 'packages/server/**'
            sync_matrix:
              - 'packages/client/**'
              - 'packages/core/**'
              - 'packages/testkit/**'
              - 'packages/server/**'

  test:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-environment

      - name: Type checks and linting
        run: bun check

      - name: Unit and integration tests
        run: |
          # Bun/Linux cannot currently execute the browser WASM integration
          # fixtures, while local pinned-Bun and browser WASM package gates still
          # cover them. Keep the generic Linux coverage job on the runnable set.
          test_file_list="$(mktemp)"
          trap 'rm -f "$test_file_list"' EXIT
          find packages tests/unit tests/dialects tests/typegen \
            -name '*.test.ts' \
            ! -path 'packages/client/src/__tests__/*.wasm.test.ts' \
            | sort > "$test_file_list"

          run_coverage() {
            xargs bun test --coverage < "$test_file_list"
          }

          set +e
          run_coverage 2>&1 | tee test-results.txt
          exit_code=${PIPESTATUS[0]}
          set -e

          if [ "$exit_code" -eq 0 ]; then
            exit 0
          fi

          if [ "$exit_code" -eq 132 ] || [ "$exit_code" -eq 133 ] || grep -q "RuntimeError: Aborted(). Build with -sASSERTIONS" test-results.txt; then
            echo "Detected transient Bun/PGlite failure; retrying test suite once..."
            run_coverage
            exit $?
          fi

          exit "$exit_code"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  starter-browser-preview:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.starter == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-environment

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          install-dependencies: true

      - name: Run create-syncular-app browser preview smoke
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          SYNCULAR_CSA_BROWSER_PREVIEW_SMOKE: required
          SYNCULAR_CSA_SMOKE_WORK_DIR: .context/starter-browser-preview-smoke
        run: bun --cwd packages/create-syncular-app smoke --require-browser-preview

      - name: Upload browser preview failure artifact
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: starter-browser-preview-${{ github.run_id }}
          if-no-files-found: ignore
          path: .context/starter-browser-preview-smoke/browser-preview-*.json

  rust-native:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.rust == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - uses: ./.github/actions/setup-environment

      - name: Run Rust native checks
        run: |
          cargo fmt --manifest-path rust/Cargo.toml --all -- --check
          cargo test --manifest-path rust/Cargo.toml --workspace
          cargo check --manifest-path rust/Cargo.toml -p syncular-runtime --no-default-features
          cargo check --manifest-path rust/Cargo.toml -p syncular-client --no-default-features --features native,crdt-yjs
          cargo run --manifest-path rust/Cargo.toml -p syncular-codegen -- --manifest-dir rust/examples/todo-app --check
          bun run release:cargo:package-check

  rust-browser-wasm:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.rust == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - uses: ./.github/actions/setup-environment

      - name: Run browser Rust package checks
        env:
          CC_wasm32_unknown_unknown: clang
        run: |
          bun --cwd packages/client test
          bun --cwd packages/client tsgo
          bun --cwd packages/client build:wasm:dev
          bun --cwd packages/client size:wasm

      - name: Upload browser WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: syncular-rust-browser-wasm-${{ github.run_id }}
          path: packages/client/dist/wasm

  rust-native-package:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.rust == 'true'
    name: rust-native-package / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Build native library package surface
        run: cargo build --manifest-path rust/Cargo.toml -p syncular-runtime --release --lib

      - name: Upload native library artifacts
        uses: actions/upload-artifact@v4
        with:
          name: syncular-native-${{ runner.os }}-${{ github.run_id }}
          if-no-files-found: error
          path: |
            rust/target/release/libsyncular_runtime.a
            rust/target/release/libsyncular_runtime.so
            rust/target/release/syncular_runtime.dll
            rust/target/release/syncular_runtime.dll.lib
            rust/target/release/syncular_runtime.lib

  rust-boltffi-package:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.rust == 'true'
    name: rust-boltffi-package / ${{ matrix.boltffi-target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - boltffi-target: apple
            os: macos-15
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin,aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios
          - boltffi-target: android
            os: ubuntu-latest
            rust-targets: aarch64-linux-android,x86_64-linux-android
          - boltffi-target: java
            os: ubuntu-latest
            rust-targets: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        if: matrix.boltffi-target == 'apple'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.3'

      - name: Setup Java
        if: matrix.boltffi-target == 'android' || matrix.boltffi-target == 'java'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        if: matrix.boltffi-target == 'android'
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        if: matrix.boltffi-target == 'android'
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "ndk;28.2.13676358"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Install BoltFFI CLI
        run: cargo install boltffi_cli --version 0.24.1 --locked

      - name: Run BoltFFI package smoke
        if: matrix.boltffi-target != 'android'
        working-directory: rust/crates/runtime
        run: boltffi pack ${{ matrix.boltffi-target }}

      - name: Run Android BoltFFI package smoke
        if: matrix.boltffi-target == 'android'
        working-directory: rust/crates/runtime
        run: |
          export ANDROID_NDK_HOME="${ANDROID_SDK_ROOT}/ndk/28.2.13676358"
          boltffi pack android

  rust-windows-jvm-package:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.rust == 'true'
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Install BoltFFI CLI
        run: cargo install boltffi_cli --version 0.24.1 --locked

      - name: Package Windows JVM binding
        shell: bash
        run: bash rust/scripts/package-native-bindings.sh --java-windows-x86_64

      - name: Upload Windows JVM binding
        uses: actions/upload-artifact@v4
        with:
          name: syncular-jvm-windows-${{ github.run_id }}
          if-no-files-found: error
          path: .context/native-packages/java/native/windows-x86_64/syncular_runtime_jni.dll

  load-smoke-pr:
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.load == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-environment
      - uses: grafana/setup-k6-action@v1

      - name: Run PR macro load smoke scenarios
        env:
          LOAD_NIGHTLY_SMOKE: true
          LOAD_NIGHTLY_SCENARIOS: reconnect-storm,mixed-workload
          LOAD_NIGHTLY_OUTPUT_JSON: load-pr-summary.json
          LOAD_NIGHTLY_RESULTS_DIR: .tmp/load-pr
          LOAD_SERVER_PORT: 3001
          LOAD_DB_DIALECT: sqlite
          SQLITE_PATH: ':memory:'
          SEED_RANDOM_SEED: 42
        run: |
          set +e
          bun run test:load:nightly 2>&1 | tee load-pr-results.txt
          exit_code=${PIPESTATUS[0]}
          set -e

          if [ "$exit_code" -eq 0 ]; then
            exit 0
          fi

          if [ "$exit_code" -eq 132 ] || [ "$exit_code" -eq 133 ]; then
            echo "Bun crashed with exit code $exit_code; retrying once..."
            bun run test:load:nightly
            exit $?
          fi

          exit "$exit_code"

      - name: Upload PR load smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-pr-smoke-${{ github.run_id }}
          path: |
            load-pr-results.txt
            load-pr-summary.json
            .tmp/load-pr
