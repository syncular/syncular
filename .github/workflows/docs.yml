name: Docs

# Builds apps/docs (Astro) and publishes dist/ to Cloudflare Pages
# (project: syncular-docs → https://syncular-docs.pages.dev). Kept in its OWN
# workflow (not a job in ci.yml) because it deploys and needs the
# CLOUDFLARE_API_TOKEN secret, which the gate workflow should not have.
#
# One-time repo setup (by hand): create a Cloudflare API token with the
# "Cloudflare Pages — Edit" template scoped to the Syncular account, then
#   gh secret set CLOUDFLARE_API_TOKEN
# The account id below is not a secret. A custom domain is a Pages dashboard
# setting (Custom domains → add), no workflow change needed.

on:
  push:
    branches: [main]
    # Path gate: only rebuild+deploy when the docs site itself (its pages,
    # styles, Astro config) or THIS workflow changed. Deliberately NOT gated
    # on package READMEs — the docs pages are hand-authored markdown under
    # apps/docs/src/content, not generated from package READMEs.
    paths:
      - 'apps/docs/**'
      - '.github/workflows/docs.yml'

# One in-flight deploy at a time; a newer push supersedes an older run rather
# than racing it. Don't cancel mid-deploy — let it finish, then the next runs.
concurrency:
  group: docs-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # DOCS_BASE stays unset: Cloudflare Pages serves at the domain root,
      # so authored root-absolute links are already correct.
      - name: Build docs (static dist/)
        working-directory: apps/docs
        run: bun run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 336bfd20ccb2f56e24ac0afeca6b4837
          command: pages deploy apps/docs/dist --project-name=syncular-docs --branch=main
