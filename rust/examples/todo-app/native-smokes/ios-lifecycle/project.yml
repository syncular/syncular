name: SyncularLifecycleApp
options:
  bundleIdPrefix: dev.syncular.smoke
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGNING_ALLOWED: "NO"
targets:
  SyncularLifecycleApp:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: ../../generated/swift/SyncularApp.swift
      - path: ../../../../bindings/swift/Sources/BoltFFI/Syncular-runtimeBoltFFI.swift
    dependencies:
      - framework: ../../../../../.context/native-smokes/ios-lifecycle/Syncular.xcframework
        embed: false
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: SyncularLifecycleApp
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
  SyncularLifecycleAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: SyncularLifecycleApp
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SyncularLifecycleApp.app/SyncularLifecycleApp"
        BUNDLE_LOADER: "$(TEST_HOST)"
schemes:
  SyncularLifecycleApp:
    build:
      targets:
        SyncularLifecycleApp: all
        SyncularLifecycleAppTests: [test]
    test:
      targets:
        - SyncularLifecycleAppTests
