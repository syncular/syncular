<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" role="img" aria-label="Syncular">
  <style>
    .ink { stroke: #16161a; fill: #16161a; }
    .ink-soft { stroke: #16161a; fill: none; opacity: 0.28; }
    @media (prefers-color-scheme: dark) {
      .ink { stroke: #ededed; fill: #ededed; }
      .ink-soft { stroke: #ededed; opacity: 0.32; }
    }
  </style>

  <circle class="ink-soft" cx="100" cy="100" r="88" stroke-width="1.2" />
  <circle class="ink-soft" cx="100" cy="100" r="58" stroke-width="1" stroke-dasharray="2 4" />

  <circle class="ink" cx="100" cy="100" r="88" stroke-width="3" fill="none" opacity="0.85" />
  <circle class="ink" cx="100" cy="100" r="18" />

  <g>
    <circle class="ink" cx="188" cy="100" r="6">
      <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="14s" repeatCount="indefinite" />
    </circle>
  </g>

  <g>
    <circle class="ink" cx="158" cy="100" r="3" opacity="0.55">
      <animateTransform attributeName="transform" type="rotate" from="360 100 100" to="0 100 100" dur="22s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
